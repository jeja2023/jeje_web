<!-- 首页 HTML / Home HTML -->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEJE WEB | 简洁、现代的个人空间</title>
    <meta name="description" content="JEJE WEB 是一个采用 Go + Vanilla JS 构建的极简个人网站，展示个人项目作品、技术分享及生活感悟。" />
    <meta name="keywords" content="个人网站, 个人博客, 项目展示, Go, Gin, JavaScript, 技术分享" />
    <link rel="stylesheet" href="/globals/global.css" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <header>
      <div class="logo">JEJE WEB</div>
      <nav>
        <a href="/">首页</a>
        <a href="#projects">项目</a>
        <a href="/messages">留言</a>
        <a href="/admin">后台</a>
      </nav>
    </header>

    <section class="hero">
      <div>
        <h1>个人网站</h1>
        <p>
          这里是我的个人空间。你可以查看我的项目作品、技术分享，并在这里留言交流。
        </p>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
          <a class="btn primary" href="#projects">浏览项目</a>
          <a class="btn" href="/messages">留言反馈</a>
        </div>
      </div>
      <div class="hero-card">
        <div class="tag">更新速览</div>
        <h2>轻量前后端分离架构</h2>
        <p class="notice">
          Go + Gin 提供 API，原生 JS 多页展示和交互。
        </p>
        <div class="banner">
          <strong>特性</strong>
          <span>项目展示 / 图文介绍 / 留言互动 / 管理回复</span>
        </div>
      </div>
    </section>

    <section id="projects" class="section">
      <h2 class="section-title">项目展示</h2>
      <div id="projectGrid" class="grid"></div>
    </section>

    <section class="section">
      <div class="banner">
        <strong>想了解更多？</strong>
        <span>点击项目卡片进入详情页，查看更多图文介绍。</span>
      </div>
    </section>

    <footer>
      <div>© 2026 JEJE WEB. Powered by Go + MySQL.</div>
    </footer>

    <script type="module" src="home.js"></script>
  </body>
</html>
