<!-- 留言板 HTML / Messages HTML -->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>留言板 - JEJE WEB</title>
    <meta name="description" content="欢迎来到笔者的留言板，请在这里留下您的建议、合作意向或技术反馈。" />
    <link rel="stylesheet" href="/globals/global.css" />
    <link rel="stylesheet" href="messages.css" />
  </head>
  <body>
    <header>
      <div class="logo">JEJE WEB</div>
      <nav>
        <a href="/">首页</a>
        <a href="/admin">后台</a>
      </nav>
    </header>

    <section class="section">
      <h2 class="section-title">留言板</h2>
      <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
        <div class="form-card">
          <h3>写下你的建议</h3>
          <form id="messageForm">
            <input name="nickname" placeholder="你的称呼" required />
            <input name="contact" placeholder="联系方式 (可选)" />
            <textarea name="content" placeholder="留言内容" required></textarea>
            <div class="captcha-box">
              <div id="captchaQuestion" class="notice">验证码加载中...</div>
              <div class="captcha-row">
                <input name="captcha_answer" placeholder="验证码答案" required />
                <button class="btn small" type="button" id="captchaRefresh">换一题</button>
              </div>
              <input type="hidden" name="captcha_id" id="captchaId" />
            </div>
            <input name="website" class="honeypot" tabindex="-1" autocomplete="off" />
            <button class="btn primary" type="submit">提交留言</button>
          </form>
        </div>
        <div>
          <h3>最新留言</h3>
          <div id="messageList" class="list"></div>
        </div>
      </div>
    </section>

    <footer>
      <div>感谢你的反馈，管理员会尽快回复。</div>
    </footer>

    <script type="module" src="messages.js"></script>
  </body>
</html>
