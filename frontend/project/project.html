<!-- 项目详情 HTML / Project HTML -->
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>项目详情 - JEJE WEB</title>
    <link rel="stylesheet" href="/globals/global.css" />
    <link rel="stylesheet" href="project.css" />
  </head>
  <body>
    <header>
      <div class="logo">JEJE WEB</div>
      <nav>
        <a href="/">首页</a>
        <a href="/messages">致信交流</a>
        <a href="/admin">后台管理</a>
      </nav>
    </header>

    <main class="container">
      <section class="section animate-fade-in">
        <div id="projectDetail">
          <!-- 内容由 JS 动态生成 -->
          <div class="text-center" style="padding: 100px 0;">
            <div class="spinner" style="margin: 0 auto;"></div>
            <p class="text-muted mt-2">正在为您加载作品详情...</p>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="card" style="padding: 40px; background: var(--bg-offset); display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 24px;">
          <div>
            <h3 style="margin-bottom: 8px;">想就此作品进行交流？</h3>
            <p class="text-muted">欢迎在留言板写下您的建议或合作意向。</p>
          </div>
          <a class="btn primary" href="/messages">前往对话</a>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 JEJE WEB</p>
    </footer>

    <script type="module" src="project.js"></script>
  </body>
</html>
